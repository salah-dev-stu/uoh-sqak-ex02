repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check
        language: system
        types: [python]
      - id: file-line-limit
        name: 150-line check
        entry: uv run python scripts/check_file_lines.py
        language: system
        pass_filenames: false
      - id: pytest-unit
        name: pytest (unit only — fast)
        entry: uv run pytest tests/unit -x -q
        language: system
        pass_filenames: false
